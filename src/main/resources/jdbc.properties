# MySQL 8 JDBC 驱动类的全限定名，Druid 会通过它创建数据库连接。
driverClassName=com.mysql.cj.jdbc.Driver
# 连接 crm_db 数据库；启用 UTF-8，固定上海时区，并允许 MySQL 8 公钥认证。
url=jdbc:mysql:///crm_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
# 数据库登录用户名，可按本机 MySQL 实际账号修改。
username=root
# 数据库密码；正式环境应改用环境变量或受保护的外部配置。
password=chenrui20051019
# 连接池启动时预先建立 5 个连接，减少首次查询的等待。
initialSize=5
# 空闲时至少保留 5 个连接。
minIdle=5
# 最多同时借出 10 个数据库连接。
maxActive=10
# 连接全部忙碌时最多等待 3000 毫秒，超时后抛出异常。
maxWait=3000
